<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOps | Advanced Port Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7f00ff;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(127, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .scanner-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1.5fr 1.3fr 1.3fr 0.9fr 1.2fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 850px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 0.9375rem;
            transition: all 0.2s;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
        }

        select option {
            background-color: var(--bg);
            color: var(--text);
            padding: 12px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-scan {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 242, 254, 0.4);
        }

        .btn-scan:active {
            transform: translateY(0);
        }

        .btn-scan:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .terminal-preview {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px 12px 16px;
            margin-top: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            color: var(--text-dim);
            position: relative;
            word-break: break-all;
            line-height: 1.4;
        }

        .terminal-preview span {
            color: var(--primary);
        }

        .terminal-label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: #14171d;
            padding: 0 8px;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .options-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.875rem;
            user-select: none;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .results-section {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        .results-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .results-table th {
            text-align: left;
            padding: 12px 20px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.8125rem;
            text-transform: uppercase;
        }

        .results-table tr {
            background: rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }

        .results-table tr:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .results-table td {
            padding: 16px 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .results-table td:first-child {
            border-radius: 12px 0 0 12px;
            font-weight: 700;
        }

        .results-table td:last-child {
            border-radius: 0 12px 12px 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-open {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-closed {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-filtered {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .toast {
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-left: 4px solid var(--primary);
            animation: slideInRight 0.3s ease-out forwards;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
        }

        .toast.error {
            border-left-color: var(--error);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>SecOps Scanner</h1>
            <p class="subtitle">High-performance network reconnaissance engine</p>
        </header>

        <main>
            <div class="scanner-card">
                <form id="scanForm">
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="target">Target Host</label>
                            <input type="text" id="target" placeholder="e.g., google.com or 1.1.1.1" required
                                value="localhost">
                        </div>
                        <div class="form-group">
                            <label for="preset">Scan Profile</label>
                            <select id="preset">
                                <option value="">Custom Range...</option>
                                <option value="1-100">Top 100 Ports</option>
                                <option value="1-1024">Standard (1-1024)</option>
                                <option value="1-65535">Full Scan (1-65535)</option>
                                <option value="80,443,8080,8443">Web Ports</option>
                                <option
                                    value="21,22,23,25,53,80,110,135,139,143,443,445,993,995,1723,3306,3389,5900,8080">
                                    Common Vulnerable</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="range">Port Range</label>
                            <input type="text" id="range" placeholder="e.g., 1-1024 or 80,443">
                        </div>
                        <div class="form-group">
                            <label for="timeout">Timeout</label>
                            <input type="number" id="timeout" placeholder="1000" min="1" value="1000">
                        </div>
                        <div class="form-group">
                            <label for="scan_type">Scan Type</label>
                            <select id="scan_type">
                                <option value="tcp">TCP Connect</option>
                                <option value="syn">TCP SYN (Full)</option>
                                <option value="udp">UDP Protocol</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-scan" id="scanBtn">
                        <span id="btnText">Execute Scan</span>
                        <div class="loader" id="loader"></div>
                    </button>
                    <div class="progress-bar-container"
                        style="display: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 15px;"
                        id="progressContainer">
                        <div class="progress-bar"
                            style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary);"
                            id="scanProgress"></div>
                    </div>
                </form>

                <div class="terminal-preview" id="terminalPreview">
                    <div class="terminal-label">CLI Equivalent</div>cargo run -- <span>pentest port-scan <span
                            id="cmdTarget">localhost</span> <span id="cmdRangeGroup"></span> <span
                            id="cmdTimeout"></span> <span id="cmdFlag"></span></span>
                </div>

                <div class="options-bar">
                    <label class="checkbox-group">
                        <input type="checkbox" id="onlyOpenToggle">
                        <span>Show Only Open Ports</span>
                    </label>
                    <div id="quickInfo" style="color: var(--text-dim); font-size: 0.75rem;">Ready to scan</div>
                </div>

                <div class="stats" id="statsPanel" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total Scanned</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: var(--success);" id="statOpen">0</div>
                        <div class="stat-label">Ports Open</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTime">0ms</div>
                        <div class="stat-label">Scan Speed</div>
                    </div>
                </div>
            </div>

            <section class="results-section" id="resultsSection">
                <div class="results-header"
                    style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <h2 style="margin: 0;">Scan Results</h2>
                        <span id="resultsTarget"
                            style="color: var(--text-dim); font-family: 'JetBrains Mono'; font-size: 0.875rem;"></span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="searchInput" placeholder="Search port or service..."
                            style="width: 250px; background: rgba(0,0,0,0.3); padding: 8px 12px;">
                        <button id="exportCsvBtn"
                            style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 0 16px; cursor: pointer; transition: background 0.2s; font-size: 0.875rem;">Export
                            CSV</button>
                    </div>
                </div>

                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Port</th>
                            <th>Protocol</th>
                            <th>Known Service</th>
                            <th>Service Status</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Results will be injected here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"
        style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999;">
    </div>

    <script>
        const scanForm = document.getElementById('scanForm');
        const presetSelect = document.getElementById('preset');
        const scanBtn = document.getElementById('scanBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const progressContainer = document.getElementById('progressContainer');
        const scanProgress = document.getElementById('scanProgress');
        const searchInput = document.getElementById('searchInput');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const resultsSection = document.getElementById('resultsSection');
        const resultsBody = document.getElementById('resultsBody');
        const resultsTarget = document.getElementById('resultsTarget');
        const statsPanel = document.getElementById('statsPanel');
        const onlyOpenToggle = document.getElementById('onlyOpenToggle');
        const quickInfo = document.getElementById('quickInfo');

        const cmdTarget = document.getElementById('cmdTarget');
        const cmdRangeGroup = document.getElementById('cmdRangeGroup');
        const cmdFlag = document.getElementById('cmdFlag');
        const cmdTimeout = document.getElementById('cmdTimeout');

        const PORT_SERVICES = {
            20: "FTP-Data", 21: "FTP", 22: "SSH/SFTP", 23: "Telnet", 25: "SMTP",
            53: "DNS", 80: "HTTP (Web)", 110: "POP3", 143: "IMAP", 443: "HTTPS (Secure Web)",
            445: "SMB/Microsoft-DS", 993: "IMAPS", 995: "POP3S", 1080: "SOCKS Proxy",
            1433: "MSSQL", 1521: "Oracle DB", 2049: "NFS", 3000: "Dev Server (React/Vue)",
            3306: "MySQL/MariaDB", 3389: "RDP (Remote Desktop)", 5000: "Flask/Docker",
            5432: "PostgreSQL", 5900: "VNC", 6379: "Redis", 8000: "Dev/HTTP Alt",
            8080: "HTTP Proxy/Alternative", 8443: "HTTPS Alternative", 9000: "PHP-FPM/SonarQube",
            9092: "Kafka", 27017: "MongoDB", 27018: "MongoDB Shard", 50000: "SAP/IBM DB2"
        };

        const getService = (port) => PORT_SERVICES[port] || "-";

        let lastScanData = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOutRight 0.3s ease-in forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        scanForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const target = document.getElementById('target').value;
            const range = document.getElementById('range').value;
            const scan_type = document.getElementById('scan_type').value;
            const timeout = parseInt(document.getElementById('timeout').value) || 1000;

            // Strict Validation
            if (range && range.trim() !== '') {
                const commaParts = range.split(',');
                for (const cp of commaParts) {
                    if (cp.trim() === '') continue;
                    const parts = cp.split('-');
                    for (const part of parts) {
                        const p = parseInt(part);
                        if (isNaN(p) || p < 1 || p > 65535) {
                            showToast(`Error: Port ${part} is out of valid range (1-65535)`, 'error');
                            return;
                        }
                    }
                }
            }

            // Estimate total ports for real progress
            const totalPorts = estimateTotalPorts(range || "1-1024");

            startLoading();
            const startTime = performance.now();

            let currentResults = {
                target: target,
                ports: []
            };

            let openCount = 0;
            resultsBody.innerHTML = '';
            resultsTarget.innerText = `Target: ${target}`;
            resultsSection.style.display = 'block';
            statsPanel.style.display = 'grid';

            try {
                const response = await fetch('/api/scan/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, range, scan_type, timeout })
                });

                if (!response.ok) throw new Error('Scan failed with status ' + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const portRes = JSON.parse(line.slice(6));
                                currentResults.ports.push(portRes);

                                // Update Stats
                                if (portRes.status === 'Open') openCount++;
                                document.getElementById('statTotal').innerText = currentResults.ports.length;
                                document.getElementById('statOpen').innerText = openCount;

                                // Update Progress Bar (Real Progress)
                                const prog = (currentResults.ports.length / totalPorts) * 100;
                                scanProgress.style.width = Math.min(prog, 99) + '%';

                                appendResultSorted(portRes);
                            } catch (e) { }
                        }
                    }
                }

                // SUCCESS: Stop animation immediately before showing 100%
                clearInterval(scanForm._animInterval);
                scanProgress.style.width = '100%';

                const endTime = performance.now();
                lastScanData = currentResults;
                document.getElementById('statTime').innerText = `${Math.round(endTime - startTime)}ms`;
                showToast(`Scan completed for ${target}`, 'success');

            } catch (err) {
                clearInterval(scanForm._animInterval);
                showToast('Error: ' + err.message, 'error');
            } finally {
                setTimeout(stopLoading, 500);
            }
        });

        // Helper to estimate total ports from range string
        function estimateTotalPorts(r) {
            let count = 0;
            try {
                r.split(',').forEach(p => {
                    const parts = p.split('-');
                    if (parts.length === 2) {
                        count += (parseInt(parts[1]) - parseInt(parts[0]) + 1);
                    } else {
                        count += 1;
                    }
                });
            } catch (e) { return 1024; }
            return count || 1;
        }

        // Appends a single result to the table, keeping Open ports at the top and sorting numerically
        function appendResultSorted(p) {
            const showOnlyOpen = onlyOpenToggle.checked;
            const searchVal = searchInput.value.toLowerCase();

            if (showOnlyOpen && p.status !== 'Open') return;

            const serviceName = getService(p.port);
            if (searchVal) {
                const rowText = `${p.port} ${p.protocol} ${serviceName} ${p.status}`.toLowerCase();
                if (!rowText.includes(searchVal)) return;
            }

            const tr = document.createElement('tr');
            tr.dataset.port = p.port;
            tr.dataset.status = p.status;
            tr.innerHTML = `
                <td>${p.port}</td>
                <td>${p.protocol}</td>
                <td style="color: var(--text-dim); font-size: 0.8125rem;">${serviceName}</td>
                <td><span class="status-badge ${getStatusClass(p.status)}">${p.status}</span></td>
            `;

            const rows = Array.from(resultsBody.querySelectorAll('tr'));

            let inserted = false;
            // We want Open ports at top, Closed/Filtered below.
            // Within each group, sort by port number.
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const rowPort = parseInt(row.dataset.port);
                const rowStatus = row.dataset.status;

                // Case 1: p is Open
                if (p.status === 'Open') {
                    if (rowStatus !== 'Open') {
                        // Open ports always go before non-Open ports
                        resultsBody.insertBefore(tr, row);
                        inserted = true;
                        break;
                    } else if (p.port < rowPort) {
                        // Both are Open, sort by port
                        resultsBody.insertBefore(tr, row);
                        inserted = true;
                        break;
                    }
                }
                // Case 2: p is not Open
                else {
                    if (rowStatus !== 'Open' && p.port < rowPort) {
                        // Both are non-Open, sort by port
                        resultsBody.insertBefore(tr, row);
                        inserted = true;
                        break;
                    }
                }
            }

            if (!inserted) {
                resultsBody.appendChild(tr);
            }
        }

        const updateCommand = () => {
            const target = document.getElementById('target').value || 'localhost';
            const range = document.getElementById('range').value;
            const scan_type = document.getElementById('scan_type').value;
            const timeout = document.getElementById('timeout').value;

            cmdTarget.innerText = target;

            if (range && range.trim() !== '') {
                cmdRangeGroup.innerText = `--range ${range}`;
                cmdRangeGroup.style.display = 'inline';
            } else {
                cmdRangeGroup.style.display = 'none';
            }

            if (timeout && timeout !== '1000') {
                cmdTimeout.innerText = `--timeout ${timeout}`;
                cmdTimeout.style.display = 'inline';
            } else {
                cmdTimeout.style.display = 'none';
            }

            let flag = '';
            if (scan_type === 'syn') flag = '--syn';
            if (scan_type === 'udp') flag = '--udp';
            cmdFlag.innerText = flag;
        };

        ['target', 'range', 'scan_type', 'timeout'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', updateCommand);
            el.addEventListener('change', updateCommand);
        });

        updateCommand();

        presetSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                document.getElementById('range').value = val;
                updateCommand();
            }
        });

        document.getElementById('range').addEventListener('input', () => {
            presetSelect.value = "";
        });

        onlyOpenToggle.addEventListener('change', () => {
            if (lastScanData) {
                renderResults(lastScanData);
            }
        });

        function startLoading() {
            scanBtn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Scanning...';
            resultsSection.style.display = 'none';
            progressContainer.style.display = 'block';
            scanProgress.style.width = '0%';
        }

        function stopLoading() {
            scanBtn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = 'Execute Scan';
            clearInterval(scanForm._animInterval);
            setTimeout(() => { progressContainer.style.display = 'none'; }, 1000);
        }

        function renderResults(data, duration) {
            lastScanData = data;
            resultsBody.innerHTML = '';
            resultsTarget.innerText = `Target: ${data.target}`;

            // Sort data first: Open at top, then by port
            const sortedPorts = [...data.ports].sort((a, b) => {
                if (a.status === 'Open' && b.status !== 'Open') return -1;
                if (a.status !== 'Open' && b.status === 'Open') return 1;
                return a.port - b.port;
            });

            const showOnlyOpen = onlyOpenToggle.checked;
            const searchVal = searchInput.value.toLowerCase();
            let openCount = 0;

            sortedPorts.forEach(p => {
                if (p.status === 'Open') openCount++;

                if (showOnlyOpen && p.status !== 'Open') {
                    return;
                }

                const serviceName = getService(p.port);

                // Search filter
                if (searchVal) {
                    const rowText = `${p.port} ${p.protocol} ${serviceName} ${p.status}`.toLowerCase();
                    if (!rowText.includes(searchVal)) return;
                }

                const tr = document.createElement('tr');
                tr.dataset.port = p.port;
                tr.dataset.status = p.status;
                tr.innerHTML = `
                    <td>${p.port}</td>
                    <td>${p.protocol}</td>
                    <td style="color: var(--text-dim); font-size: 0.8125rem;">${serviceName}</td>
                    <td><span class="status-badge ${getStatusClass(p.status)}">${p.status}</span></td>
                `;
                resultsBody.appendChild(tr);
            });

            document.getElementById('statTotal').innerText = data.ports.length;
            document.getElementById('statOpen').innerText = openCount;
            if (duration !== undefined) {
                document.getElementById('statTime').innerText = `${duration}ms`;
            }

            statsPanel.style.display = 'grid';
            resultsSection.style.display = 'block';
        }

        function getStatusClass(status) {
            switch (status) {
                case 'Open': return 'status-open';
                case 'Closed': return 'status-closed';
                case 'Filtered': return 'status-filtered';
                default: return '';
            }
        }

        searchInput.addEventListener('input', () => {
            if (lastScanData) renderResults(lastScanData);
        });

        exportCsvBtn.addEventListener('click', () => {
            if (!lastScanData || !lastScanData.ports.length) {
                showToast('No data to export', 'error');
                return;
            }

            let csv = 'Port,Protocol,Service,Status\n';
            lastScanData.ports.forEach(p => {
                csv += `${p.port},${p.protocol},"${getService(p.port)}",${p.status}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `scan_${lastScanData.target}_${Date.now()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported to CSV successfully', 'success');
        });
    </script>
</body>

</html>
